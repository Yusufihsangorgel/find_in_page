<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="1.5" fill="#E2E8F0" opacity="0.05"/>
    </pattern>
    <clipPath id="lens">
      <circle cx="950" cy="165" r="78"/>
    </clipPath>
  </defs>

  <rect width="1200" height="400" fill="#0B1220"/>
  <rect width="1200" height="400" fill="url(#dots)"/>

  <!-- Motif: magnifier over highlighted text lines -->
  <g stroke="#38BDF8" stroke-width="3" fill="none" stroke-linecap="round">
    <!-- faint text lines on the page, broken around the lens -->
    <g opacity="0.35">
      <line x1="820" y1="105" x2="888" y2="105"/>
      <line x1="1012" y1="105" x2="1085" y2="105"/>
      <line x1="820" y1="225" x2="888" y2="225"/>
      <line x1="1012" y1="225" x2="1085" y2="225"/>
    </g>
    <!-- text lines inside the lens -->
    <g clip-path="url(#lens)">
      <line x1="880" y1="135" x2="1020" y2="135"/>
      <line x1="880" y1="195" x2="1020" y2="195"/>
    </g>
    <!-- the active match: filled highlight behind the middle line -->
    <rect x="905" y="152" width="90" height="26" rx="6"
          fill="#38BDF8" fill-opacity="0.25"/>
    <line x1="880" y1="165" x2="898" y2="165"/>
    <line x1="912" y1="165" x2="988" y2="165"/>
    <line x1="1002" y1="165" x2="1020" y2="165"/>
    <!-- lens and handle -->
    <circle cx="950" cy="165" r="78"/>
    <line x1="1006" y1="221" x2="1072" y2="287" stroke-width="7"/>
  </g>

  <!-- Wordmark -->
  <text x="64" y="300" font-family="Menlo, 'DejaVu Sans Mono', monospace"
        font-size="64" font-weight="bold" fill="#E2E8F0">find_in_page</text>
  <text x="64" y="344" font-family="Menlo, 'DejaVu Sans Mono', monospace"
        font-size="24" fill="#94A3B8">Ctrl+F for Flutter widgets</text>
</svg>
