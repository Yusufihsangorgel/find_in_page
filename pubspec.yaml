name: find_in_page
description: >-
  Ctrl+F for Flutter. Highlight search matches across your widgets,
  navigate between them, and scroll the active match into view.
version: 0.1.2
repository: https://github.com/Yusufihsangorgel/find_in_page
issue_tracker: https://github.com/Yusufihsangorgel/find_in_page/issues

topics:
  - search
  - find
  - highlight
  - text
  - widgets

screenshots:
  - description: >-
      Typing a query highlights every match on the page; next/previous
      jump between matches and scroll the active one into view.
    path: doc/demo.gif

environment:
  sdk: ^3.4.0
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
